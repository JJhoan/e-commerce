# Quarkus Configuration
quarkus.application.name=orchestrator
quarkus.http.port=8080

# Database (disabled for bootstrap - enable when first persistence is needed)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:orchestrator}
quarkus.datasource.password=${DB_PASSWORD:orchestrator}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/orchestrator}
quarkus.hibernate-orm.database.generation=validate

# SerpApi
serpapi.key=${SERPAPI_KEY}
serpapi.base-url=${SERPAPI_BASE_URL:https://serpapi.com/search.json}

# SerpApi REST Client
quarkus.rest-client.serpapi.url=https://serpapi.com
quarkus.rest-client.serpapi.scope=jakarta.inject.Singleton

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.ecommerce".level=DEBUG
